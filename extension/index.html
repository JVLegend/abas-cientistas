<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="João Victor">
  <title>Abas Cientistas</title>

  <script>
    document.documentElement.dataset.theme = localStorage.getItem('abas-cientistas-theme') || 'light';
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">



  <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
  <header>
    <div class="header-left">
      <!-- Saudação escrita por getGreeting() em app.js -->
      <h1 id="greeting"></h1>
      <!-- Data escrita por getDateDisplay() em app.js -->
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="header-actions" aria-label="Preferência visual">
      <button class="theme-option" type="button" data-action="set-theme" data-theme-value="light" title="Tema claro" aria-pressed="true">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
        Claro
      </button>
      <button class="theme-option" type="button" data-action="set-theme" data-theme-value="dark" title="Tema escuro" aria-pressed="false">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75 9.75 9.75 0 0 1 8.25 6c0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25 9.75 9.75 0 0 0 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
        </svg>
        Escuro
      </button>
    </div>
  </header>

  <div class="command-bar" aria-label="Comandos de organização">
    <label class="search-shell" for="tabSearch">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
      </svg>
      <input id="tabSearch" type="search" placeholder="Buscar por projeto, repo, paper, app ou domínio">
    </label>
    <div class="density-toggle" id="statusSummary" aria-live="polite"></div>
  </div>

  <!-- ================================================================
       ABAS CIENTISTAS DUPES BANNER — appears when extra new-tab pages are open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        Você tem <strong id="tabOutDupeCount"></strong> abas do Abas Cientistas abertas. Manter só esta?
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">Fechar extras</button>
  </div>

  <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       Left: open tabs (domain/mission cards)
       Right: saved for later checklist
       The right column only renders when it has items (JS controls this)
       ================================================================ -->
  <div class="dashboard-columns" id="dashboardColumns">

    <aside class="workspace-sidebar" id="workspaceSidebar" style="display:none" aria-label="Grupos de abas"></aside>

    <!-- LEFT COLUMN: Open tabs -->
    <main class="workspace-main">
      <div class="active-section" id="openTabsSection" style="display:none">
        <div class="section-header">
          <h2 id="openTabsSectionTitle">Visão científica</h2>
          <div class="section-line"></div>
          <div class="section-count" id="openTabsSectionCount"></div>
        </div>
        <div class="missions" id="openTabsMissions"></div>
      </div>
    </main>

    <aside class="insight-column" id="insightColumn">
      <section class="focus-panel" id="focusPanel" style="display:none" aria-label="Foco agora"></section>
      <section class="cleanup-panel" id="cleanupPanel" style="display:none" aria-label="Limpeza sugerida"></section>

      <!-- RIGHT COLUMN: Saved for Later checklist -->
      <div class="deferred-column" id="deferredColumn" style="display:none">
        <div class="section-header">
          <h2>Revisar depois</h2>
          <div class="section-line"></div>
          <div class="section-count" id="deferredCount"></div>
        </div>

        <!-- Active checklist items — injected by renderDeferredList() in app.js -->
        <div class="deferred-list" id="deferredList"></div>

        <!-- Empty state — shown when no active deferred tabs -->
        <div class="deferred-empty" id="deferredEmpty" style="display:none">
          Nada salvo. Sua fila de pesquisa está limpa.
        </div>

        <!-- Archive section — collapsed by default -->
        <div class="deferred-archive" id="deferredArchive" style="display:none">
          <button class="archive-toggle" id="archiveToggle">
            <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
            Arquivo
            <span class="archive-count" id="archiveCount"></span>
          </button>
          <div class="archive-body" id="archiveBody" style="display:none">
            <input type="text" class="archive-search" id="archiveSearch" placeholder="Buscar no arquivo...">
            <div class="archive-list" id="archiveList"></div>
          </div>
        </div>
      </div>
    </aside>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Abas abertas</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statGroups">—</div>
        <div class="stat-label">Grupos</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statCleanup">—</div>
        <div class="stat-label">Alertas</div>
      </div>
    </div>
    <div class="last-refresh">
      <span style="color: var(--muted); font-size: 13px;">Abas Cientistas · criado e adaptado por João Victor</span>
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
